# Ловец-Съёмка — конфиг. Читается stdlib tomllib, правится прямо на GitHub (файл → карандаш → commit).

[filter]
budget_min        = 15000    # заказы с ЯВНОЙ ценой ниже — отсекаем (чуть ниже 20к, чтобы не терять «около 20»)
target_min        = 20000    # целевая вилка — такие помечаем 🎯
target_max        = 50000
active_hours_msk  = [8, 24]  # вне этих часов (МСК) запуск сразу выходит
first_run_max     = 8        # при пустом seen (первый запуск) слать не больше N, остальное молча пометить

# Префильтр по ключам: заказ идёт к Claude, если есть хит ИЛИ указана цена >= budget_min
keywords = [
  # видео — основное
  "видеосъёмк", "видеосъемк", "видеограф", "видеооператор", "снять видео", "съёмка видео",
  "съемка видео", "видеоролик", "ролик", "промо-ролик", "промо видео", "рекламное видео",
  "товарное видео", "видео для маркетплейс", "видеоконтент", "видео для сайта",
  "видео для соцсет", "рилс", "reels", "видеовизитк", "интервью", "подкаст",
  # фото/съёмка вообще
  "фотосъёмк", "фотосъемк", "фотограф", "съёмк", "съемк", "фотосесси",
  "предметн", "каталож", "маркетплейс", "wildberries", "озон", "ozon",
  "бизнес-портрет", "корпоративн", "хедшот", "headshot", "фото сотрудник",
  "фуд", "фото блюд", "фото для меню", "интерьерн", "фото квартир",
]

# Стоп-слова: отсекаем сразу, до Claude
stop = [
  "на документы", "на паспорт", "на визу", "3х4", "3x4", "свадьб", "свадебн", "венчани",
  "нужна модель", "нужна фотомодель", "требуется модель", "ищем модель", "ищу модель",
  "монтажёр", "монтажер", "видеомонтаж без съёмки", "смонтировать из готов",
  "закадров", "озвучк", "научить фотограф", "обучение фотограф", "курс фотограф",
  "таролог", "гадани", "накрутк", "бартер",
]

[youdo]
enabled    = true
category   = "photoshop"     # Фото, видео и аудио
lat        = 55.753215       # Москва
lng        = 37.622504
radius_km  = 50
max_offers = 5               # заказ с большим числом откликов — перегрет, пропускаем

[profi]
enabled = true               # требует секрет PROFI_COOKIES (см. README); false = выключить

# Нейросеть-фильтр — клиент как в Ловец-FPV. Ключ — в секрете LLM_API_KEY
# (для provider="anthropic" подхватится и ANTHROPIC_API_KEY).
[llm]
enabled  = true
provider = "chad"            # ChadGPT (подписка SAF) · "anthropic" = Claude · "openai" = OpenRouter/AITunnel и др.
api_base = "https://openrouter.ai/api/v1"   # только для provider="openai"
model    = "claude-3.7-sonnet"   # у Chad; запасной: gpt-5.2. Для anthropic: claude-haiku-4-5
fallback_models = []             # для provider="openai": запасные модели по очереди
max_feedback_examples = 40   # сколько последних 👍/👎 подмешивать в промпт
min_score = 6                # слать, если оценка >= N (0-10); он же проходной при fail-open
